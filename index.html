<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Site Update</title>

<!-- Force no caching -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#ffffff;
    color:#222;
    font-family:"Quicksand", sans-serif;
}

.container{
    max-width:520px;
    padding:40px 28px;
    text-align:center;
}

img{
    width:120px;
    height:auto;
    margin-bottom:20px;
}

h1{
    font-family:"Ubuntu", sans-serif;
    font-size:28px;
    font-weight:500;
    margin:0 0 14px 0;
}

p{
    font-size:15px;
    line-height:1.6;
    margin:6px 0;
}

.note{
    margin-top:18px;
    font-size:13px;
    color:#666;
}

@media (max-width:600px){

.container{
    padding:30px 22px;
}

img{
    width:100px;
}

h1{
    font-size:24px;
}

p{
    font-size:14px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWRo_JBfz4Q1BcQLTcTjdwfl1Oj9VxgfMysQ&s" alt="update">

<h1>Website Update</h1>

<p>
The website is temporarily unavailable My Love while improvements are being made.
</p>

<p>
Your BOYFRIEND will let you know shortly.
</p>

<div class="note">
Thank you for your patience.
</div>

</div>

<script>

/* Destroy service workers (important for web apps) */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    for (let registration of registrations) {
      registration.unregister();
    }
  });
}

/* Clear storage used by web apps */
localStorage.clear();
sessionStorage.clear();

/* Clear caches */
if ('caches' in window) {
  caches.keys().then(function(names) {
    for (let name of names) caches.delete(name);
  });
}

</script>

</body>
</html>
